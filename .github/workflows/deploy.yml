name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: deploy-dvops-docs

jobs:
  ask-worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/ask
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

      # Build the real embeddings index from the docs before deploying, so the
      # bundled ask-index.json always matches the published documentation.
      - name: Build embeddings index
        working-directory: .
        run: node scripts/build-ask-index.mjs
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy ask worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Sync worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            printf '%s' "$ANTHROPIC_API_KEY" | npx wrangler secret put ANTHROPIC_API_KEY
          else
            echo "ANTHROPIC_API_KEY not set in GitHub secrets - skipping"
          fi

  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Synced tool docs are committed, so a plain build works here; run
      # `npm run sync` locally against the MCP repo when its docs change.
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@4 pages project create dvops-docs --production-branch=main 2>/dev/null || true
          npx wrangler@4 pages deploy dist --project-name=dvops-docs
